services:
  bot:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-openai/qwen3.6-27b}
      AUTO_DOWNLOAD_ENABLED: ${AUTO_DOWNLOAD_ENABLED:-false}
      BOT_TOKEN: ${BOT_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/tldrbot.sqlite}
      HF_TOKEN: ${HF_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TOKEN_LIMIT_ENABLED: ${TOKEN_LIMIT_ENABLED:-true}
      TOKEN_LIMIT_MAX_INPUT_TOKENS: ${TOKEN_LIMIT_MAX_INPUT_TOKENS:-64000}
      TOKENIZER_CACHE_DIR: ${TOKENIZER_CACHE_DIR:-/data/tokenizers}
      TOKENIZER_FILENAME: ${TOKENIZER_FILENAME:-tokenizer.json}
      TOKENIZER_REPO_ID: ${TOKENIZER_REPO_ID:-Qwen/Qwen3.6-27B}
      TOKENIZER_REVISION: ${TOKENIZER_REVISION:-main}
      TOKENIZER_URL: ${TOKENIZER_URL:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
    volumes:
      - bot-data:/data
    restart: unless-stopped

volumes:
  bot-data:
